__include__: [
  '../rtdetr/include/rtdetr_r50vd.yml',
  '../runtime.yml'
]

epoches: 72  
# ── Model ──────────────────────────────────────────────────────────────────────
# RTDETR is the registered model class (from rtdetr_r50vd.yml include).
# We override just the backbone to use the 4-channel PResNetRGBN.
RTDETR:
  backbone: PResNetRGBN
  encoder: HybridEncoder
  decoder: RTDETRTransformer
  multi_scale: [480, 512, 544, 576, 608, 640, 640, 640, 672, 704, 736, 768, 800]

# ── 4-channel Backbone ─────────────────────────────────────────────────────────
PResNetRGBN:
  depth: 50
  variant: d
  freeze_at: 0
  return_idx: [1, 2, 3]
  num_stages: 4
  freeze_norm: True
  pretrained: True      # loads RGB weights; NIR channel init = mean(RGB weights)

# ── Dataset ────────────────────────────────────────────────────────────────────
num_classes: 24
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: RGBNDataset
    img_folder: /home/user18/bhunayan/Bhunayan2/DEV/dataset/train
    ann_file: /home/user18/bhunayan/Bhunayan2/DEV/dataset/train.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: RandomPhotometricDistort}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: SanitizeBoundingBoxes}
        - {type: ConvertBox, out_fmt: cxcywh, normalize: True}
  shuffle: True
  batch_size: 8
  num_workers: 4
  drop_last: True
  collate_fn: default_collate_fn

val_dataloader:
  type: DataLoader
  dataset:
    type: RGBNDataset
    img_folder: /home/user18/bhunayan/Bhunayan2/DEV/dataset/val
    ann_file: /home/user18/bhunayan/Bhunayan2/DEV/dataset/val.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: Resize, size: [640, 640]}
        - {type: ConvertBox, out_fmt: cxcywh, normalize: True}
  shuffle: False
  batch_size: 4
  num_workers: 4
  drop_last: False
  collate_fn: default_collate_fn

# ── 4-channel Normalisation (R, G, B, NIR) ────────────────────────────────────
# Uncomment and add a Normalize step in the transforms ops above once you have
# computed per-channel mean/std from your dataset.
# Normalize: {mean: [0.485, 0.456, 0.406, 0.45], std: [0.229, 0.224, 0.225, 0.22]}

# ── Criterion overrides ────────────────────────────────────────────────────────
# Inherited from rtdetr_r50vd.yml; no changes needed for num_classes since
# the model reads num_classes from GLOBAL_CONFIG at build time.