__include__: [
  '../rtdetr/include/rtdetr_r50vd.yml',
  '../runtime.yml'
]

epoches: 72

# ── Model ──────────────────────────────────────────────
RTDETR:
  backbone: PResNetRGBN
  encoder: HybridEncoder
  decoder: RTDETRTransformer
  multi_scale: ~                        # disabled until AP > 0

PResNetRGBN:
  depth: 50
  variant: d
  freeze_at: 0
  return_idx: [1, 2, 3]
  num_stages: 4
  freeze_norm: True
  pretrained: True

# ── Dataset ────────────────────────────────────────────
num_classes: 25
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: RGBNDataset
    img_folder: /home/user18/bhunayan/Bhunayan2/DEV/dataset/train
    ann_file: /home/user18/bhunayan/Bhunayan2/DEV/dataset/train.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: SanitizeBoundingBoxes}
        - {type: ConvertBox, out_fmt: cxcywh, normalize: True}
        - {type: ToPureTensor}
        - {type: ToDtypeFloat32}
        - {type: Normalize, mean: [0.485, 0.456, 0.406, 0.45],
                            std:  [0.229, 0.224, 0.225, 0.22]}
  shuffle: True
  batch_size: 8
  num_workers: 4
  drop_last: True
  collate_fn: default_collate_fn

val_dataloader:
  type: DataLoader
  dataset:
    type: RGBNDataset
    img_folder: /home/user18/bhunayan/Bhunayan2/DEV/dataset/val
    ann_file: /home/user18/bhunayan/Bhunayan2/DEV/dataset/val.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: Resize, size: [640, 640]}
        - {type: ToPureTensor}
        - {type: ToDtypeFloat32}
        - {type: Normalize, mean: [0.485, 0.456, 0.406, 0.45],
                            std:  [0.229, 0.224, 0.225, 0.22]}
  shuffle: False
  batch_size: 4
  num_workers: 4
  drop_last: False
  collate_fn: default_collate_fn

# ── Optimizer ───────────────────────────────────────────
optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?=.*norm).*$'
      weight_decay: 0.
    -
      params: '^(?=.*backbone)(?!.*norm).*$'
      lr: 0.00001
    -
      params: '^(?!.*backbone)(?=.*norm).*$'
      weight_decay: 0.
  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001

# ── LR Scheduler ────────────────────────────────────────
lr_scheduler:
  type: MultiStepLR
  milestones: [60]
  gamma: 0.1

lr_warmup_scheduler:
  type: LinearWarmup
  warmup_duration: 2000